<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myHotel Basic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>myHotel</h2>

    <div class="menu-btn" onclick="toggleMenu()">
        ☰
    </div>

    <div class="nav-links" id="navLinks">
        <a href="#">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Fresh Meals.<br>Fast Delivery.</h1>
        <p>Experience premium dining from the comfort of your home.</p>
        <a href="#menu"><button>Order Now</button></a>
    </div>

    <div class="hero-img">
        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=600" alt="">
    </div>
</section>

<section id="menu">
    <h2>Popular Meals</h2>

    <div class="food-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=500">
            <h3>Pilau Beef</h3>
            <p>KSh 450</p>
            <button>Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500">
            <h3>Pizza</h3>
            <p>KSh 900</p>
            <button>Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=500">
            <h3>Burger</h3>
            <p>KSh 700</p>
            <button>Order</button>
        </div>
    </div>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <p>📍 Nairobi, Kenya</p>
    <p>📞 +254 711 906 157</p>
    <p>✉ orders@myhotel.com</p>
</section>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
